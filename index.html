<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing Trainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF2A5F;
            --primary-hover: #E31B4D;
            --bg-color: #08080A;
            --surface: #141416;
            --surface-border: #222226;
            --text: #F4F4F5;
            --text-secondary: #A1A1AA;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Top Progress Bar Edge-to-Edge */
        .progress-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--surface-border);
            z-index: 20;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 100%;
            transition: width 1s linear;
        }

        .progress-bar.paused {
            background-color: #FBBF24;
            transition: none;
            /* stop sliding when paused */
        }

        body.is-drawing .progress-bar-container {
            display: block;
        }

        /* Top Layout */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 24px 32px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .logo-icon {
            width: 12px;
            height: 12px;
            background-color: var(--primary);
            border-radius: 50%;
        }

        /* Flat Timer HUD */
        .timer-hud {
            position: absolute;
            top: 24px;
            right: 32px;
            background-color: var(--surface);
            border: 1px solid var(--surface-border);
            padding: 8px 16px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .timer-hud.active {
            opacity: 1;
            transform: translateY(0);
        }

        .timer-hud.urgent #timer-text {
            color: var(--primary);
        }

        .timer-hud.paused-state {
            border-color: #FBBF24;
        }

        .timer-label {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            transition: background-color 0.3s;
        }

        .timer-hud.urgent .timer-label {
            background-color: var(--primary);
            animation: blink 1s infinite;
        }

        .timer-hud.paused-state .timer-label {
            background-color: #FBBF24;
            animation: none;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        #timer-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            min-width: 44px;
        }

        /* Image Stage */
        .stage {
            flex: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 100px 10px 120px 10px; /* Reduced padding for more image space */
            box-sizing: border-box;
        }

        #image {
            max-width: 100%;
            max-height: calc(100vh - 160px); /* Increased space for larger images */
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.4s ease;
            display: none;
            box-sizing: border-box;
        }

        #image.loaded {
            opacity: 1;
            display: block;
        }

        /* Pause Overlay */
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 10, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 600;
            letter-spacing: 2px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
            z-index: 5;
        }

        body.is-paused .pause-overlay {
            opacity: 1;
        }

        /* Initial State Empty Placeholder */
        .placeholder-box {
            background-color: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .placeholder-text {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .placeholder-text b {
            color: var(--text);
            font-weight: 500;
        }

        .api-badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(255, 42, 95, 0.1);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
        }

        .api-badge.active {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10B981;
        }

        .loader {
            display: none;
            width: 48px;
            height: 48px;
            border: 3px solid var(--surface-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: absolute;
            z-index: 10;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Bottom Controls */
        .controls-wrapper {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            transition: opacity 0.3s ease;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .controls {
            background-color: var(--bg-color);
            border: 1px solid var(--surface-border);
            padding: 8px;
            border-radius: 100px;
            display: flex;
            gap: 8px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        /* Toggle between setups */
        .setup-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .session-controls {
            display: none;
            gap: 8px;
            align-items: center;
        }

        body.is-drawing .setup-controls {
            display: none;
        }

        body.is-drawing .session-controls {
            display: flex;
        }

        .input-group {
            display: flex;
            align-items: center;
            background-color: var(--surface);
            border-radius: 100px;
            padding: 0 20px;
            height: 48px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--surface-border);
        }

        input {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        #search {
            width: 220px;
        }

        .divider {
            width: 1px;
            height: 24px;
            background-color: var(--surface-border);
            margin: 0 4px;
        }

        .time-input-container {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        #time {
            width: 32px;
            text-align: center;
            font-weight: 500;
            color: var(--text);
            padding: 0;
        }

        #time::-webkit-inner-spin-button,
        #time::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            height: 48px;
            padding: 0 24px;
            border-radius: 100px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.primary-btn {
            background-color: var(--primary);
            color: white;
        }

        button.primary-btn:hover {
            background-color: var(--primary-hover);
        }

        button.primary-btn:active {
            opacity: 0.9;
            transform: scale(0.98);
        }

        button.secondary-btn {
            background-color: var(--surface);
            color: var(--text);
            border: 1px solid var(--surface-border);
            min-width: 48px;
            width: 48px;
            padding: 0;
        }

        button.secondary-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        button.secondary-btn:hover {
            background-color: #222226;
        }

        /* Auto-hide controls when drawing */
        body.is-drawing .controls-wrapper {
            opacity: 0;
            pointer-events: none;
        }

        body.is-drawing .stage:hover~.controls-wrapper,
        body.is-drawing .controls-wrapper:hover {
            opacity: 1;
            pointer-events: all;
        }

        /* Persistent controls when paused */
        body.is-paused .controls-wrapper {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>

<body>

    <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="header">
        <div class="logo">
            <div class="logo-icon"></div>
            Drawing Trainer
        </div>

        <div class="timer-hud" id="timer-hud">
            <div class="timer-label"></div>
            <span id="timer-text">00:30</span>
        </div>
    </div>

    <div class="stage" id="stage">
        <div class="pause-overlay">PAUSED</div>
        <div class="placeholder-box" id="placeholder">
            <div class="placeholder-text">
                Enter a topic to begin practice.<br>
                For Pinterest, paste a <b>pinterest board URL</b>!
            </div>
            <div class="api-badge" id="api-status">Mock Mode</div>
        </div>
        <div class="loader" id="loader"></div>
        <img id="image" alt="Reference Image">
    </div>

    <div class="controls-wrapper">
        <div class="controls">
            <!-- Initial Search Setup -->
            <div class="setup-controls">
                <div class="input-group">
                    <input id="search" placeholder="Topic or Pinterest URL..." autocomplete="off">
                </div>
                <div class="divider"></div>
                <div class="input-group">
                    <div class="time-input-container">
                        <input id="time" type="number" value="30" min="5" max="3600">
                        <span>sec</span>
                    </div>
                </div>
                <button class="primary-btn" onclick="start()" id="start-btn">Start</button>
            </div>

            <!-- Drawing Session Controls -->
            <div class="session-controls">
                <button class="secondary-btn" onclick="togglePause()" id="pause-btn" aria-label="Pause" title="Pause"></button>
                <button class="secondary-btn" onclick="skipImage()" id="skip-btn" aria-label="Skip" title="Skip"></button>
                <div class="divider"></div>
                <button class="secondary-btn" onclick="shuffleImages()" id="shuffle-btn" aria-label="Shuffle" title="Shuffle"></button>
                <button class="secondary-btn" onclick="endSession()" id="end-btn" aria-label="End" title="End"></button>
            </div>
        </div>
    </div>

    <script>
        let images = [];
        let index = 0;
        let timerInterval;
        let timeLeft = 30;
        let totalTimeForImage = 30;
        let isPaused = false;

        const API_KEY = "sj2QdkFpBrxRmCFqtsBz4gHyl4KZlWA4x0s_ovd2KaQ";

        const BUTTON_ICONS = {
            pause: '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>',
            play: '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>',
            skip: '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M5 4l10 8-10 8V4zm12 0h2v16h-2V4z"/></svg>',
            shuffle: '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 3h5v5l-2.5-2.5L16 9V3zm-8 4.5L6.5 5 4 7.5 8 11h2V7.5zm0 9L6.5 19 4 16.5 8 13h2v3.5zm8-4.5V15l2.5-2.5L21 15V9h-5z"/></svg>',
            end: '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>'
        };

        async function fetchUrlText(url) {
            const proxyTemplates = [
                'https://api.allorigins.win/raw?url=',
                'https://api.allorigins.win/get?url=',
                'https://corsproxy.io/?',
                'https://thingproxy.freeboard.io/fetch/',
                'https://cors-anywhere.herokuapp.com/'
            ];

            for (const template of proxyTemplates) {
                try {
                    const proxyUrl = `${template}${encodeURIComponent(url)}`;
                    console.log('Trying proxy:', template);
                    const res = await fetch(proxyUrl, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                        }
                    });
                    if (!res.ok) {
                        console.warn('Proxy failed with status:', res.status, template);
                        continue;
                    }

                    if (template.includes('/get?url=')) {
                        const data = await res.json();
                        const content = data.contents || '';
                        if (content.length > 100) { // Make sure we got actual content
                            return content;
                        }
                    } else {
                        const text = await res.text();
                        if (text.length > 100) { // Make sure we got actual content
                            return text;
                        }
                    }
                } catch (err) {
                    console.warn('Proxy fetch failed:', template, err.message);
                }
            }

            throw new Error('All Pinterest proxy fetch methods failed. The board may be private or inaccessible.');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const apiStatus = document.getElementById('api-status');
            if (API_KEY === "YOUR_API_KEY_HERE" || !API_KEY) {
                apiStatus.innerText = "API Key Needed / Mock Logic";
                apiStatus.className = "api-badge";
            } else {
                apiStatus.innerText = "Live API";
                apiStatus.className = "api-badge active";
            }

            document.getElementById("search").addEventListener("keypress", (e) => {
                if (e.key === "Enter" && !document.body.classList.contains("is-drawing")) {
                    start();
                }
            });
            document.getElementById("time").addEventListener("keypress", (e) => {
                if (e.key === "Enter" && !document.body.classList.contains("is-drawing")) {
                    start();
                }
            });

            document.getElementById('pause-btn').innerHTML = BUTTON_ICONS.pause;
            document.getElementById('skip-btn').innerHTML = BUTTON_ICONS.skip;
            document.getElementById('shuffle-btn').innerHTML = BUTTON_ICONS.shuffle;
            document.getElementById('end-btn').innerHTML = BUTTON_ICONS.end;

            // Spacebar pause toggle
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && document.body.classList.contains("is-drawing") && document.activeElement.tagName !== 'INPUT') {
                    e.preventDefault();
                    togglePause();
                }
            });
        });

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        async function fetchPinterestBoard(url) {
            try {
                let normalizedUrl = url.trim();
                // Handle URLs without protocol
                if (!/^https?:\/\//i.test(normalizedUrl)) {
                    normalizedUrl = `https://${normalizedUrl}`;
                }
                // Ensure we have www. for Pinterest
                if (normalizedUrl.includes('pinterest.com') && !normalizedUrl.includes('www.pinterest.com')) {
                    normalizedUrl = normalizedUrl.replace('pinterest.com', 'www.pinterest.com');
                }

                const html = await fetchUrlText(normalizedUrl);

                // Extract all Pinterest image URLs - more comprehensive patterns
                const allRegex = /https?:\/\/(?:i|s)\.pinimg\.com\/[^"'\s]+\.(?:jpg|jpeg|png|webp)/gi;
                const escapedRegex = /https?:\\\/\\\/(?:i|s)\.pinimg\.com\\\/[^"'\s]+\.(?:jpg|jpeg|png|webp)/gi;
                // Also try some alternative patterns that might appear in Pinterest HTML
                const altRegex = /"https?:\/\/(?:i|s)\.pinimg\.com\/[^"]+\.(?:jpg|jpeg|png|webp)"/gi;

                const matches = html.match(allRegex) || [];
                const escapedMatches = (html.match(escapedRegex) || []).map((u) => u.replace(/\\\//g, '/'));
                const altMatches = (html.match(altRegex) || []).map((u) => u.slice(1, -1)); // Remove quotes

                const allImages = [...matches, ...escapedMatches, ...altMatches].map((u) => u.split('?')[0]);

                console.log('Found image URLs:', allImages.length);

                // Prioritize higher resolution images and filter out low-res/watermarked ones
                const imagePriority = {
                    'originals': 5,
                    '736x': 4,
                    '564x': 3,
                    '474x': 2,
                    '236x': 1
                };

                // Group images by their base URL (without size prefix)
                const imageGroups = {};
                allImages.forEach(imgUrl => {
                    // Extract the base part after pinimg.com/
                    const match = imgUrl.match(/pinimg\.com\/([^\/]+\/[^\/]+\/[^\/]+)\//);
                    if (match) {
                        const baseKey = match[1];
                        const sizeMatch = imgUrl.match(/pinimg\.com\/(\d+x|originals)\//);
                        const size = sizeMatch ? sizeMatch[1] : 'unknown';

                        if (!imageGroups[baseKey]) {
                            imageGroups[baseKey] = [];
                        }
                        imageGroups[baseKey].push({ url: imgUrl, size, priority: imagePriority[size] || 0 });
                    }
                });

                // Select the highest quality version of each unique image
                const selectedImages = [];
                Object.values(imageGroups).forEach(group => {
                    // Sort by priority (highest first) and take the best one
                    group.sort((a, b) => b.priority - a.priority);
                    const bestImage = group[0];
                    // Only include images that are at least medium quality (564x or higher)
                    if (bestImage.priority >= 3) {
                        selectedImages.push(bestImage.url);
                    }
                });

                if (selectedImages.length === 0) {
                    // Fallback: try to construct high-res URLs from any images we found
                    const fallbackImages = allImages
                        .filter(img => !img.includes('236x') && !img.includes('474x'))
                        .map(img => img.replace(/\/\d+x\//, '/736x/'))
                        .slice(0, 10); // Take first 10

                    if (fallbackImages.length > 0) {
                        console.log('Using fallback images:', fallbackImages.length);
                        return fallbackImages;
                    }

                    throw new Error('No high-quality images found. The board may be private, empty, or Pinterest may be blocking access.');
                }

                // Shuffle the results for variety
                console.log(`Found ${selectedImages.length} high-quality Pinterest images`);
                return selectedImages.sort(() => Math.random() - 0.5);
            } catch (err) {
                console.error('Pinterest Fetch Error:', err);
                return [];
            }
        }

        async function fetchImages(query) {
            // Check if user pasted a Pinterest URL (more robust detection)
            const normalizedQuery = query.toLowerCase().trim();
            if (normalizedQuery.includes('pinterest.com') || normalizedQuery.includes('pinterest.') ||
                normalizedQuery.match(/pinterest\.com\/\w+\/\w+/)) {
                return await fetchPinterestBoard(query);
            }

            // Normal Unsplash or Mock flow
            if (API_KEY === "YOUR_API_KEY_HERE" || !API_KEY) {
                return Array.from({ length: 10 }).map((_, i) =>
                    `https://picsum.photos/seed/${encodeURIComponent(query)}${i}/1200/900`
                );
            }

            const url = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=20&orientation=landscape`;
            try {
                const res = await fetch(url, { headers: { Authorization: `Client-ID ${API_KEY}` } });
                if (!res.ok) throw new Error("API request failed");
                const data = await res.json();
                return data.results.map(img => img.urls.regular);
            } catch (err) {
                console.error("Error fetching from API, falling back to mock Mode:", err);
                return Array.from({ length: 10 }).map((_, i) =>
                    `https://picsum.photos/seed/${encodeURIComponent(query)}${i}/1200/900`
                );
            }
        }

        async function start() {
            const queryInput = document.getElementById("search").value;
            const query = queryInput.trim() || 'random';

            totalTimeForImage = parseInt(document.getElementById("time").value) || 30;
            timeLeft = totalTimeForImage;
            isPaused = false;

            const startBtn = document.getElementById("start-btn");
            startBtn.innerText = "Loading";
            startBtn.disabled = true;

            document.getElementById("placeholder").style.display = 'none';
            document.getElementById("loader").style.display = 'block';
            document.getElementById("image").classList.remove('loaded');
            document.getElementById("timer-hud").classList.remove('active');

            clearInterval(timerInterval);

            images = await fetchImages(query);
            index = 0;

            startBtn.innerText = "Start";
            startBtn.disabled = false;
            document.getElementById("loader").style.display = 'none';

            if (images.length === 0) {
                document.getElementById("placeholder").style.display = 'block';
                document.getElementById("placeholder").innerHTML = `
                    <div class='placeholder-text'>
                        No high-quality images found. Check that:<br>
                        • The Pinterest board is public<br>
                        • The URL is correct (e.g., https://www.pinterest.com/username/boardname/)<br>
                        • The board contains actual images (not just links or text)
                    </div>`;
                return;
            }

            document.body.classList.add('is-drawing');
            document.body.classList.remove('is-paused');

            // Sync UI Pause Button
            updatePauseButton(false);

            showImage();
        }

        function endSession() {
            clearInterval(timerInterval);
            document.body.classList.remove('is-drawing');
            document.body.classList.remove('is-paused');
            document.getElementById("timer-hud").classList.remove('active');
            document.getElementById("image").classList.remove('loaded');
            document.getElementById("placeholder").style.display = 'block';
            document.getElementById("placeholder").innerHTML = `
                <div class='placeholder-text'>
                    Session Ended.<br>
                    Enter a topic to begin practice.<br>
                    For Pinterest, paste a <b>pinterest board URL</b>!
                </div>
                <div class="api-badge" id="api-status">API / Mock Mode</div>`;
        }

        function showImage() {
            const imgEl = document.getElementById("image");

            const tempImg = new Image();
            tempImg.onload = () => {
                imgEl.src = images[index];
                imgEl.classList.add('loaded');
                document.getElementById("timer-hud").classList.add('active');

                // Only reset the timer if it isn't currently paused (like jumping from initial load)
                if (!isPaused) {
                    timeLeft = totalTimeForImage;
                    runTimer();
                } else {
                    timeLeft = totalTimeForImage;
                    updateTimerDisplay(); // reflect full bar visually until unpaused
                }
            };
            tempImg.src = images[index];
            imgEl.classList.remove('loaded');
        }

        function runTimer() {
            clearInterval(timerInterval);
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                if (isPaused) return; // redundant safety

                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    nextImage();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerText = document.getElementById("timer-text");
            const hud = document.getElementById("timer-hud");
            const progressBar = document.getElementById("progress-bar");

            timerText.innerText = formatTime(timeLeft);

            // Progress bar
            const percent = (timeLeft / totalTimeForImage) * 100;
            progressBar.style.width = `${percent}%`;

            if (timeLeft <= 5 && !isPaused) {
                hud.classList.add('urgent');
            } else {
                hud.classList.remove('urgent');
            }
        }

        function nextImage() {
            index = (index + 1) % images.length;
            showImage();
        }

        // --- Added Control Functions --- //

        function updatePauseButton(paused) {
            const btn = document.getElementById('pause-btn');
            btn.innerHTML = paused ? BUTTON_ICONS.play : BUTTON_ICONS.pause;
            btn.title = paused ? 'Resume' : 'Pause';
            btn.setAttribute('aria-label', paused ? 'Resume drawing' : 'Pause drawing');
        }

        function togglePause() {
            const hud = document.getElementById("timer-hud");
            const progressBar = document.getElementById("progress-bar");

            isPaused = !isPaused;
            updatePauseButton(isPaused);

            if (isPaused) {
                clearInterval(timerInterval);
                document.body.classList.add('is-paused');
                hud.classList.add('paused-state');
                hud.classList.remove('urgent');
                progressBar.classList.add('paused');
            } else {
                document.body.classList.remove('is-paused');
                hud.classList.remove('paused-state');
                progressBar.classList.remove('paused');
                runTimer();
            }
        }

        function skipImage() {
            if (isPaused) togglePause(); // unpause when skipping
            nextImage();
        }

        function shuffleImages() {
            if (images.length <= 1) return;

            // Fisher-Yates array shuffle implementation
            for (let i = images.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [images[i], images[j]] = [images[j], images[i]];
            }
            // reset to new first image layout
            index = 0;

            if (isPaused) togglePause(); // unpause when shuffling
            showImage();
        }
    </script>
</body>
